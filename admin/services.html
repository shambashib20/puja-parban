<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — PujaParban Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../assets/logo.jpeg" alt="Puja Parban" class="sidebar-logo-img" /></div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a href="index.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Manage</div>
      <a href="priests.html" class="sidebar-link"><span class="icon">🧘</span> Priests<span class="sidebar-badge">24</span></a>
      <a href="bookings.html" class="sidebar-link"><span class="icon">📅</span> Bookings<span class="sidebar-badge">8</span></a>
      <a href="services.html" class="sidebar-link active"><span class="icon">🪔</span> Services</a>
      <a href="blog.html" class="sidebar-link"><span class="icon">📝</span> Blog</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">System</div>
      <a href="#" class="sidebar-link"><span class="icon">👥</span> Users</a>
      <a href="#" class="sidebar-link"><span class="icon">⭐</span> Reviews</a>
      <a href="#" class="sidebar-link"><span class="icon">⚙️</span> Settings</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar">A</div>
      <div><div class="sidebar-user-name">Admin User</div><div class="sidebar-user-role">Super Admin</div></div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="topbar">
      <div class="topbar-left">
        <h2>Services</h2>
        <p>Manage puja services offered on the platform</p>
      </div>
      <div class="topbar-right">
        <a href="../index.html" class="back-link">← View Site</a>
        <button class="btn btn-primary" onclick="openModal('addServiceModal')">➕ Add Service</button>
      </div>
    </div>

    <div class="page-content">

      <div class="card">
        <div class="card-header">
          <span class="card-title">All Services (12)</span>
          <div class="search-bar" style="width:240px;">
            <span>🔍</span>
            <input type="text" placeholder="Search services…" />
          </div>
        </div>

        <div id="servicesGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
        </div>
      </div>
    </div>
  </main>
</div>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<!-- ADD SERVICE MODAL -->
<div class="modal-overlay" id="addServiceModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Add New Service</h3>
      <button class="modal-close" onclick="closeModal('addServiceModal')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Service Name *</label>
        <input class="form-control" type="text" placeholder="e.g. Griha Pravesh" />
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Icon (Emoji)</label>
        <input class="form-control" type="text" placeholder="e.g. 🏠" />
      </div>
      <div class="form-group">
        <label class="form-label">Base Price (₹) *</label>
        <input class="form-control" type="number" placeholder="e.g. 800" />
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Duration</label>
        <input class="form-control" type="text" placeholder="e.g. 2-3 hours" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control">
          <option>Home Ceremony</option>
          <option>Festival Puja</option>
          <option>Life Events</option>
          <option>Special Puja</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="3" placeholder="Brief description of the service…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addServiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="alert('Service added!');closeModal('addServiceModal')">Add Service</button>
    </div>
  </div>
</div>

<!-- EDIT SERVICE MODAL -->
<div class="modal-overlay" id="editServiceModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="editModalTitle">Edit Service</h3>
      <button class="modal-close" onclick="closeModal('editServiceModal')">✕</button>
    </div>
    <div id="editModalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editServiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="alert('Service updated!');closeModal('editServiceModal')">Save Changes</button>
    </div>
  </div>
</div>

<script>
const services = [
  { id:1, name:'Griha Pravesh', icon:'🏠', price:800, duration:'2-3 hrs', bookings:38, active:true, category:'Home Ceremony' },
  { id:2, name:'Marriage Puja', icon:'💍', price:2000, duration:'4-6 hrs', bookings:22, active:true, category:'Life Events' },
  { id:3, name:'Namkaran', icon:'👶', price:600, duration:'1-2 hrs', bookings:15, active:true, category:'Life Events' },
  { id:4, name:'Annaprashan', icon:'🍚', price:700, duration:'1-2 hrs', bookings:12, active:true, category:'Life Events' },
  { id:5, name:'Durga Puja', icon:'🪔', price:1500, duration:'3-4 hrs', bookings:42, active:true, category:'Festival Puja' },
  { id:6, name:'Laxmi Puja', icon:'✨', price:800, duration:'2-3 hrs', bookings:28, active:true, category:'Festival Puja' },
  { id:7, name:'Kali Puja', icon:'🔱', price:1000, duration:'3-4 hrs', bookings:18, active:true, category:'Festival Puja' },
  { id:8, name:'Satyanarayan Puja', icon:'🙏', price:900, duration:'2-3 hrs', bookings:20, active:false, category:'Special Puja' },
  { id:9, name:'Saraswati Puja', icon:'📚', price:700, duration:'2 hrs', bookings:14, active:true, category:'Festival Puja' },
  { id:10, name:'Bhai Phonta', icon:'🤝', price:500, duration:'1 hr', bookings:9, active:true, category:'Festival Puja' },
  { id:11, name:'Janmashtami Puja', icon:'🎵', price:800, duration:'3 hrs', bookings:7, active:false, category:'Festival Puja' },
  { id:12, name:'Upanayana', icon:'🧵', price:1500, duration:'4-5 hrs', bookings:5, active:true, category:'Life Events' },
];

function renderServices(data) {
  document.getElementById('servicesGrid').innerHTML = data.map(s => `
    <div style="border:1.5px solid var(--border);border-radius:10px;padding:20px;background:var(--white);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div style="font-size:2.5rem;">${s.icon}</div>
        <label class="toggle">
          <input type="checkbox" ${s.active ? 'checked' : ''} onchange="alert('Status updated for ${s.name}')">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <h4 style="font-size:1rem;font-weight:700;margin-bottom:4px;">${s.name}</h4>
      <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:10px;">${s.category} · ${s.duration}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:1.1rem;font-weight:800;color:var(--purple);">₹${s.price}</div>
        <div style="font-size:.78rem;color:var(--text-muted);">${s.bookings} bookings</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" style="flex:1;" onclick="editService(${s.id})">✏️ Edit</button>
        <button class="btn btn-sm" style="background:var(--cream);border:1px solid var(--border);color:var(--danger);" onclick="if(confirm('Delete ${s.name}?'))alert('Deleted')">🗑️</button>
      </div>
    </div>
  `).join('');
}

renderServices(services);

function editService(id) {
  const s = services.find(x => x.id === id);
  document.getElementById('editModalTitle').textContent = `Edit: ${s.name}`;
  document.getElementById('editModalContent').innerHTML = `
    <div class="form-row cols-2">
      <div class="form-group"><label class="form-label">Name</label><input class="form-control" value="${s.name}" /></div>
      <div class="form-group"><label class="form-label">Icon</label><input class="form-control" value="${s.icon}" /></div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group"><label class="form-label">Base Price (₹)</label><input class="form-control" type="number" value="${s.price}" /></div>
      <div class="form-group"><label class="form-label">Duration</label><input class="form-control" value="${s.duration}" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-control">
          <option ${s.category==='Home Ceremony'?'selected':''}>Home Ceremony</option>
          <option ${s.category==='Festival Puja'?'selected':''}>Festival Puja</option>
          <option ${s.category==='Life Events'?'selected':''}>Life Events</option>
          <option ${s.category==='Special Puja'?'selected':''}>Special Puja</option>
        </select>
      </div>
    </div>
  `;
  openModal('editServiceModal');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
</script>
</body>
</html>
