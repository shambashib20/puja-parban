<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — PujaParban Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../assets/logo.jpeg" alt="Puja Parban" class="sidebar-logo-img" /></div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a href="index.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Manage</div>
      <a href="priests.html" class="sidebar-link"><span class="icon">🧘</span> Priests<span class="sidebar-badge">24</span></a>
      <a href="bookings.html" class="sidebar-link"><span class="icon">📅</span> Bookings<span class="sidebar-badge">8</span></a>
      <a href="services.html" class="sidebar-link"><span class="icon">🪔</span> Services</a>
      <a href="blog.html" class="sidebar-link active"><span class="icon">📝</span> Blog</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">System</div>
      <a href="#" class="sidebar-link"><span class="icon">👥</span> Users</a>
      <a href="#" class="sidebar-link"><span class="icon">⭐</span> Reviews</a>
      <a href="#" class="sidebar-link"><span class="icon">⚙️</span> Settings</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar">A</div>
      <div><div class="sidebar-user-name">Admin User</div><div class="sidebar-user-role">Super Admin</div></div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="topbar">
      <div class="topbar-left">
        <h2>Blog Posts</h2>
        <p>Create and manage blog content</p>
      </div>
      <div class="topbar-right">
        <a href="../index.html" class="back-link">← View Site</a>
        <button class="btn btn-primary" onclick="showEditor()">✍️ New Post</button>
      </div>
    </div>

    <div class="page-content">

      <!-- Post List -->
      <div id="postListView">
        <div class="card" style="margin-bottom:16px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
            <div class="search-bar" style="flex:1;min-width:200px;">
              <span>🔍</span>
              <input type="text" placeholder="Search blog posts…" />
            </div>
            <select class="form-control" style="width:160px;">
              <option>All Status</option>
              <option>Published</option>
              <option>Draft</option>
            </select>
            <select class="form-control" style="width:160px;">
              <option>All Categories</option>
              <option>Puja Guide</option>
              <option>Festival</option>
              <option>Tips</option>
            </select>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">All Posts (8)</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Post Title</th>
                  <th>Category</th>
                  <th>Author</th>
                  <th>Published</th>
                  <th>Views</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blogTbody">
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Editor (hidden by default) -->
      <div id="editorView" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <button class="btn btn-outline" onclick="hideEditor()">← Back to Posts</button>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-outline" onclick="alert('Saved as draft!')">Save Draft</button>
            <button class="btn btn-primary" onclick="alert('Post published!')">🚀 Publish</button>
          </div>
        </div>

        <div class="two-col" style="gap:16px;">
          <div>
            <div class="card" style="margin-bottom:16px;">
              <div class="form-group" style="margin-bottom:16px;">
                <label class="form-label">Post Title *</label>
                <input class="form-control" type="text" placeholder="Enter a descriptive title…" style="font-size:1.1rem;font-weight:600;" />
              </div>
              <div class="form-group" style="margin-bottom:16px;">
                <label class="form-label">Content *</label>
                <div style="border:1.5px solid var(--border);border-radius:8px;overflow:hidden;">
                  <div style="display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--border);background:var(--cream);flex-wrap:wrap;">
                    <button class="btn-icon btn" onclick="formatText('bold')" title="Bold"><strong>B</strong></button>
                    <button class="btn-icon btn" onclick="formatText('italic')" title="Italic"><em>I</em></button>
                    <button class="btn-icon btn" onclick="formatText('h2')" title="Heading">H2</button>
                    <button class="btn-icon btn" onclick="formatText('ul')" title="List">• List</button>
                    <button class="btn-icon btn" onclick="formatText('link')" title="Link">🔗</button>
                  </div>
                  <textarea id="contentEditor" style="width:100%;min-height:320px;padding:16px;border:none;font-size:.9rem;font-family:inherit;resize:vertical;outline:none;line-height:1.8;" placeholder="Write your blog post here…

Tip: Use clear headings, short paragraphs, and Bengali text where appropriate for better engagement."></textarea>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="card" style="margin-bottom:16px;">
              <div class="card-header"><span class="card-title">Post Settings</span></div>
              <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Category</label>
                <select class="form-control">
                  <option>Puja Guide</option>
                  <option>Festival</option>
                  <option>Tips &amp; Tricks</option>
                  <option>Priest Stories</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Tags</label>
                <input class="form-control" type="text" placeholder="puja, griha-pravesh, kolkata…" />
              </div>
              <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Featured Image URL</label>
                <input class="form-control" type="url" placeholder="https://…" />
              </div>
              <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Author</label>
                <input class="form-control" type="text" value="PujaParban Team" />
              </div>
              <div class="form-group">
                <label class="form-label">Publish Date</label>
                <input class="form-control" type="date" />
              </div>
            </div>

            <div class="card">
              <div class="card-header"><span class="card-title">SEO</span></div>
              <div class="form-group" style="margin-bottom:12px;">
                <label class="form-label">Meta Title</label>
                <input class="form-control" type="text" placeholder="SEO title…" />
              </div>
              <div class="form-group">
                <label class="form-label">Meta Description</label>
                <textarea class="form-control" rows="3" placeholder="Brief description for search engines…"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<script>
const posts = [
  { id:1, title:'পুষ্পদেব পূজার নিয়ম', category:'Puja Guide', author:'PujaParban Team', date:'10 May 2025', views:1240, status:'Published' },
  { id:2, title:'বিয়ের পূজার সম্পূর্ণ গাইড', category:'Puja Guide', author:'PujaParban Team', date:'05 May 2025', views:2150, status:'Published' },
  { id:3, title:'লক্ষ্মী পূজার ফুল ও নিয়ম', category:'Festival', author:'PujaParban Team', date:'01 May 2025', views:1890, status:'Published' },
  { id:4, title:'গৃহপ্রবেশ পূজার সম্পূর্ণ বিধি', category:'Puja Guide', author:'Admin', date:'25 Apr 2025', views:980, status:'Published' },
  { id:5, title:'কালীপূজার মন্ত্র ও বিধান', category:'Festival', author:'Admin', date:'20 Apr 2025', views:3200, status:'Published' },
  { id:6, title:'নামকরণ সংস্কারের গুরুত্ব', category:'Tips & Tricks', author:'PujaParban Team', date:'—', views:0, status:'Draft' },
  { id:7, title:'অন্নপ্রাশনের শুভ সময়', category:'Tips & Tricks', author:'Admin', date:'15 Apr 2025', views:670, status:'Published' },
  { id:8, title:'সত্যনারায়ণ পূজার কথা', category:'Puja Guide', author:'PujaParban Team', date:'—', views:0, status:'Draft' },
];

function renderPosts(data) {
  document.getElementById('blogTbody').innerHTML = data.map(p => `
    <tr>
      <td>
        <div class="cell-name" style="max-width:280px;">${p.title}</div>
      </td>
      <td><span class="badge badge-purple">${p.category}</span></td>
      <td style="font-size:.82rem;">${p.author}</td>
      <td style="font-size:.82rem;">${p.date}</td>
      <td style="font-weight:600;">${p.views.toLocaleString()}</td>
      <td><span class="badge ${p.status==='Published'?'badge-success':'badge-warning'}">${p.status}</span></td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-outline" onclick="showEditor()">✏️ Edit</button>
          <button class="btn-icon btn" style="color:var(--danger);" onclick="if(confirm('Delete this post?'))alert('Deleted')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

renderPosts(posts);

function showEditor() {
  document.getElementById('postListView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
}

function hideEditor() {
  document.getElementById('editorView').style.display = 'none';
  document.getElementById('postListView').style.display = 'block';
}

function formatText(type) {
  const ta = document.getElementById('contentEditor');
  const map = { bold:'**selected text**', italic:'_selected text_', h2:'## Heading', ul:'- List item', link:'[Link Text](https://url.com)' };
  const insert = map[type] || '';
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + insert + ta.value.slice(ta.selectionEnd);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
</script>
</body>
</html>
